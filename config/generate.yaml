model_name_or_path: data/large_language_model/Qwen/Qwen2.5-14B-Instruct
checkpoint_dir: checkpoint/old_ckpt/qwen14b_boa_256/step_12000
input_file: generate/input_prompt/inputtest.txt
output_root: output
output_name: boa256日记
device: cuda
batch_size: 4
print_prompts: true
use_chat_template: true

prompt_debug:
  enabled: false
  output_dir: debug/prompt
  include_rendered_prompt: true
  include_messages: true
  include_model_output: true

generation:
  max_new_tokens: 220
  temperature: 0.65
  top_p: 0.85
  top_k: 40
  repetition_penalty: 1.08
  num_beams: 1
  stop_sequences:
    - "\n---"
    - "\n## "
    - "\n# "
    - "\n#"
    - "\n### "
    - "```"
    - "<!--"
