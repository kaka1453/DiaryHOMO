model_name_or_path: data/large_language_model/Qwen/Qwen2.5-7B-Instruct
checkpoint_dir: checkpoint/old_ckpt/qwen7b_boa_256/epoch_103
input_file: generate/input_prompt/inputtest.txt
output_file: generate/output/test1.md
device: cuda
batch_size: 1
print_prompts: true
use_chat_template: true

prompt_debug:
  enabled: false
  output_dir: debug/prompt
  include_rendered_prompt: true
  include_messages: true
  include_model_output: true

generation:
  max_new_tokens: 256
  temperature: 0.9
  top_p: 0.9
  top_k: 60
  repetition_penalty: 6.0
  num_beams: 1
  stop_sequences:
    - "\n---"
    - "\n## "
    - "\n# "
    - "<!--"
