# DiaryGuard 配置
# 作用：
# - 被 diary_core/config/infer_config.py 读取，并传给 diary_core/infer/guard.py。
# - 控制 DiaryGuard 的主题守卫、旧记忆漂移词、格式检查、语言噪声与质量警告。
# - 这里不做内容安全审核，只做“是否守题、是否跑到旧主题、格式/语言是否崩、质量是否空泛”。
# - 如果某些词是当前 prompt 明确授权的主题，guard.py 会动态解禁，不应误杀。

enabled: true
max_retry: 1
retry_on_revise: true
retry_on_warnings: false
pass_with_warnings: true
fail_strategy: best_attempt

thresholds:
  min_final_score: 75
  min_topic_score: 55
  min_drift_score: 85
  min_format_score: 85
  min_language_score: 75
  min_quality_score: 60

extra_forbidden_terms:
  # 旧记忆/旧日记残留词。只在本次 prompt 未授权时作为漂移信号。
  - yyj
  - b计算机
  - 冰激凌
  - 浩海钓具
  - 钓鱼用品店
  - 反向伞
  - 大明瑾
  - 圣地
  - 分校区
  - 旧人物档案
  - 过去的聊天
  - 聊天记录
  - 顾问
  - 虚无妹妹
  - b政治
  - 数学课
  - 高中作业
  - 晚自习
  - 课程预习

