term_aliases:
  宿舍: [寝室]
  被迫围观: [围观, 吸引出来, 出来看]
  和朋友吃饭: [朋友们一起吃, 朋友们聚餐, 和朋友们一起吃]
  朋友: [朋友们]
  考研: [备考, 上岸]
  复习: [刷题, 做题, 学习]
  调侃: [吐槽, 难蚌]
  反抗: [对抗]
  黑纸运动: [黑纸]
  起义: [抗议, 行动]
  cat: [邪恶表妹, 表妹]
  邪恶表妹: [cat, 表妹]

quality:
  enabled: true
  min_quality_score: 60
  min_length_by_type:
    keyword: 40
    short_daily: 50
    question: 50
    opening: 90
    instruction: 120
    style_instruction: 120
    simulation_instruction: 120
  max_prompt_copy_ratio: 0.45
  generic_template_penalty: true
  repetition_penalty_enabled: true
  require_scene_for_humor: true

  generic_template_terms:
    - 总的来说
    - 这种体验让我
    - 这让我意识到
